                <h3>逆勢操作：箱型區間交易</h3>

<p><strong>適用情境</strong>：盤整市場中，在箱型上下緣來回操作。</p>

<p><strong>操作步驟</strong>：
<ol>
<li>確認箱型區間明確（多次觸碰到上緣和下緣）</li>
<li>在箱型下緣附近買進</li>
<li>在箱型上緣附近賣出</li>
<li>停損設在突破箱型邊界</li>
</ol>
<strong>風險</strong>：
- 盤整時間可能很短，突破隨時發生
- 頻繁交易成本高
- <strong>一般投資人不建議，順勢操作勝率較高</strong></p>
