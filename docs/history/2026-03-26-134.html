                <h3>島狀反轉</h3>

<p><strong>是什麼</strong>：股價跳空上漲後，在高檔無法創新高，接著再向下跳空下跌，圖形上形成「島嶼」形狀。</p>

<p><strong>判斷標準</strong>：
- 左邊有向上跳空缺口
- 右邊有向下跳空缺口
- 中間高點像海上島嶼</p>

<p><strong>怎麼做</strong>：
<ol>
<li>辨識：已有一段漲幅 + 跳空開高 + 幾天後跳空開低</li>
<li>操作：做空好機會（發生在大跌初期）</li>
<li>注意：島狀反轉可能出現假訊號，需等2-3天確認</li>
</ol></p>
