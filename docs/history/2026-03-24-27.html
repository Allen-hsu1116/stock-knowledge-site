                <h3>為什麼要評估管理階層</h3>

<p><strong>是什麼</strong>：投資就是投人，CEO直接決定企業能做多大、走多遠。</p>

<p><strong>巴菲特說過</strong>：「這輩子從來沒有遇過跟壞人打交道能做成好生意的。」</p>

<p><strong>關鍵點</strong>：
- 企業失敗案例中，只有一小部分是因為決策者才能有限
- 更多是因為「方向或心術不正」導致的失敗
- 有能力但心術不正的經營者，比沒能力更危險</p>

<p><strong>適用時機</strong>：投資任何公司前，先評估經營階層品質</p>
