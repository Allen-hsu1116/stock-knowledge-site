                <h2>核心知識</h2>

<h3>報復性交易是什麼</h3>

<p><strong>定義</strong>：當交易者發生虧損後，內心產生「想要馬上把虧損賺回來」的強烈衝動，導致衝動交易、過度交易，甚至加大部位賭一把，最終造成更大損失，陷入惡性循環。</p>

<p><strong>為什麼危險</strong>：
- 情緒會影響判斷，讓人忽略通常會考慮的關鍵因素
- 報復性交易通常會導致更大風險的行動
- 可能形成追損的惡性循環，難以擺脫
- 導致潛在的財務和心理傷害</p>
