                <h4>5. 羊群效應 (Herding Effect)</h4>

<p><strong>是什麼</strong>：模仿群體行為，即使缺乏理性基礎。</p>

<p><strong>陷阱表現</strong>：
- 盲目追逐市場熱點或概念股
- 在群體狂熱時買入，群體恐慌時賣出
- 成為最後的接盤俠</p>

<p><strong>紀律對策</strong>：
- 堅持獨立思考與個人研究
- 建立自己的投資框架與原則
- 避免過度關注短期市場噪音和社群媒體狂熱</p>
