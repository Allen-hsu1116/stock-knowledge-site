                <h2>三、停損設定三大原則</h2>

<h3>原則一：進場前就設好</h3>

<p>不是進場後再想停損在哪，而是<strong>擬定進場策略時就要設好停損點</strong>。</p>

<h3>原則二：設好不得更改</h3>

<p>設好的停損點<strong>不能更改</strong>，改了等於沒設。</p>

<h3>原則三：收盤價跌破停損價立即出場</h3>

<p>要有<strong>壯士斷腕的決心</strong>，收盤跌破停損價 → 執行賣出。</p>
