                <h3>八、何時使用權證</h3>

<p><strong>最佳時機</strong>：預期短期內會有巨大波動</p>

<p><strong>實例</strong>：
- 財報公布前後
- 法說會前夕
- 重大政策事件
- 選舉、升息等大事件
- 個股題材發酵期</p>

<p><strong>不該用權證的時候</strong>：
- 盤整期（時間價值會一直耗損）
- 不確定方向
- 沒有時間看盤
- 想長期投資</p>
