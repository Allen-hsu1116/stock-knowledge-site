                <h3>董監改選行情定義</h3>

<p><strong>是什麼</strong>：公司派和市場派在股東會前搶奪籌碼，導致股價易漲難跌的現象。公司法規定董監事任期最長3年，每3年改選一次，雙方為了經營權會大買股票鎖住籌碼。</p>

<p><strong>為什麼會漲</strong>：
- 公司派：怕經營權被搶走，持股不賣甚至回補
- 市場派：想取得經營權，從市場不斷買進
- 籌碼被鎖住只進不出，供需失衡，股價自然上漲</p>
