<p><strong>設定</strong>：
- 價格跌破5日均 → 進場做空
- 價格突破5日均 → 出場（或反向做多）
- 停損：ATR的1/4或1/5（例：ATR 219點，停損設44-55點）
- 停利：5日均 ± 35點移動停利</p>

<p><strong>特點</strong>：用日K看，波段有800-1200點獲利。</p>
