                <h4>6.2 可重複性 & 獨立事件</h4>

<p><strong>可重複性</strong>：
- 策略足夠客觀、定義嚴謹
- 每次執行邏輯相同
- 盤感、小道消息、衝動交易 → 不具可重複性</p>

<p><strong>獨立事件</strong>：
- 上一次交易失敗，不影響這次的執行
- <strong>最高指導原則</strong>：除非有進行規則更改，否則都應依照規則執行
- 不要每做完一筆就優化，會污染交易樣本</p>
