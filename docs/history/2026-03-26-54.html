                <h3>五、價值投資缺點與注意事項</h3>

<h4>四大缺點</h4>

<ol>
<li><strong>流動性低</strong>：資金被鎖 5~10 年，錯過其他機會</li>
<li><strong>經驗不足易誤判</strong>：可能高估內在價值，掉入「價值陷阱」</li>
<li><strong>集中投資風險高</strong>：誤判單一公司會造成巨大損失</li>
<li><strong>忽略技術面</strong>：太專注基本面，忽略技術指標</li>
