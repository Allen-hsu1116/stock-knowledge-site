                <p style="color: var(--text-muted); margin-bottom: 24px;">2026-03-26  · <span class="tag technical">📊 技術分析</span></p>
                <h3>如何畫出箱型？</h3>

<p><strong>達華斯的方法</strong>：
- 股價連續3次突破不了某價位 → 箱型上限確立
- 股價連續3次跌破不了某價位 → 箱型下限確立</p>

<p><strong>實務經驗</strong>：
- 實際上很難真的等3次，1個高峰+1個低谷就可以畫初始箱型
- 箱型時間越長，參考價值越高
- 用K線圖看，不要用折線圖（要能看到最高最低價）</p>
