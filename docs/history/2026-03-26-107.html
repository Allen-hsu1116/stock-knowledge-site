                <h3>選股原則</h3>

<p><strong>達華斯的選股條件</strong>：
<ol>
<li>選擇有一定成交量的股票（避免被主力操控）</li>
<li>選擇成長股或熱門產業（不是穩定大型股）</li>
<li>股價來到歷史高點或近兩三年相對高價（代表動能強）</li>
<li>搭配基本面：獲利狀況正在轉好</li>
</ol>
<strong>不適合的標的</strong>：
- 冷門股、小股票（主力可以自己畫線）
- 下降趨勢中的股票（箱型理論專為做多設計）</p>
