                <p style="color: var(--text-muted); margin-bottom: 24px;">2026-03-25  · <span class="tag risk">⚠️ 風險管理</span></p>
                <p><strong>條件2：董監持股質押比率過高</strong></p>

<p><strong>是什麼</strong>：董監事拿股票當擔保品向銀行借款，代表現金部位不足</p>

<p><strong>怎麼判斷</strong>：
- 質押比率>50%：超過一半的持股被抵押，容易成為市場派獵物
- 公司法規定：質押超過當選時持股的1/2，超過部分不得行使表決權</p>

<p><strong>實例</strong>：
- 2016年：18家質押比率超過5成</p>
