                <h3>二、風險量化指標</h3>

<p><strong>指標一：VaR 風險價值</strong>
- 定義：95% 信心下，最大可能虧損
- 用途：設定風險限額、監控風險</p>

<p><strong>指標二：MDD 最大回撤</strong>
- 定義：從歷史高點到谷底的最大跌幅
- 關鍵洞察：跌幅 50% 需要漲 100% 恢復
- 建議：MDD 控制在 20% 以內</p>

<p><strong>指標三：夏普比率</strong>
- 報酬率 / 波動率
- 衡量每單位風險的報酬</p>
