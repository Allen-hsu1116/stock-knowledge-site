                <h4>3. 使用注意事項</h4>

<p><strong>時間長度</strong>：
- 建議以長期為參考依據
- 需包含多頭、空頭與各種市場狀況
- 參考期限太短，無法看出真正風險</p>

<p><strong>流動性問題</strong>：
- 低流動性資產（小盤股、私募）可能讓風險數值失真
- 實際風險比數值顯示的更高</p>

<p><strong>樣本充足性</strong>：
- 獲利與虧損樣本都要充足
- 少數幾筆大賺可能拉高整體報酬
- 關鍵問題：績效未來能否重複複製？</p>
