<p><strong>是什麼</strong>：均線下彎，價格反彈到均線無法突破，再下跌。</p>

<p><strong>怎麼做</strong>：
<ol>
<li>確認均線「下彎」</li>
<li>價格反彈接近均線</li>
<li>無法突破，出現黑K → 放空</li>
</ol>
<strong>實例</strong>：台玻 2022 年 9 月，均線下彎，價格反彈到月線無法突破，連續下跌。</p>
