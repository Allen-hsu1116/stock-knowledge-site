                <h4>心法五：順勢留倉 + 慎選進場點</h4>

<p><strong>是什麼</strong>：行情偏多留多單，偏空留空單，且位置要好。</p>

<p><strong>實例</strong>：
- 台指期從15200跌到14000（1200點跌幅）
- 空在跌完後的藍點（低點）→ 隨便反彈200點就被掃
- 順勢但進場點差 = 還是會停損</p>
