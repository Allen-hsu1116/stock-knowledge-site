                <h3>流動性風險實戰注意事項</h3>

<p><strong>造市者角色</strong>：
- Market Maker 提供流動性
- 衍生性商品市場最重要
- 賺取買賣價差微利</p>

<p><strong>資訊不對稱風險</strong>：
- 流動性低 → 參與者少
- 擁有資訊優勢者可能吃虧
- 新手沒有優勢，容易被宰</p>

<p><strong>市場恐慌影響</strong>：
- 極端恐慌時所有金融商品都會難以成交
- 通常是暫時性
- 沒有賣不掉的東西，只有賣不掉的價格</p>
