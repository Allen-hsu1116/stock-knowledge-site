                <h3>Q4年報資訊最精確</h3>

<p><strong>是什麼</strong>：年報的查帳方式是「查核」，可信度最高。</p>

<p><strong>為什麼</strong>：
<ol>
<li><strong>查核方式最嚴謹</strong> — 盤點、發函證都做</li>
<li><strong>會計師一次調整入帳</strong> — 如退休金估算</li>
<li><strong>獨家資訊只在年報揭露</strong> — 如投資性不動產公允價值</li>
</ol>
<strong>怎麼做</strong>：
- 投資決策以年報資訊為主
- 季報用來追蹤趨勢，不做重大決策依據</p>
