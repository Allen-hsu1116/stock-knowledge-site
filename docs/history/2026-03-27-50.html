                <h2>核心知識</h2>

<h3>一、凱利公式是什麼</h3>

<p><strong>定義</strong>：由貝爾實驗室約翰·凱利（John Kelly）於1956年提出的數學公式，解決「在正期望值的機會中，應該投入多少資金」這個核心問題。</p>

<p><strong>目標</strong>：最大化長期資本的幾何增長率（複利），而非單次期望值。</p>

<p><strong>核心價值</strong>：
- 平衡獲利潛力與破產風險
- 避免過度投注導致的毀滅性虧損
- 避免投注不足錯失增長機會</p>
