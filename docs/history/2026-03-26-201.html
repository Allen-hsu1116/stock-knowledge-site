                <h3>五、星期效應</h3>

<p><strong>是什麼</strong>：股市存在週一效應，週一下跌機率較高。</p>

<p><strong>台股星期效應</strong>：
- 存在顯著的星期一效應（1996年後）
- 集中在第三、第四個星期一
- 原因：散戶假日蒐集資訊後，週一發現券商建議不當而賣出</p>

<p><strong>怎麼做</strong>：
<ol>
<li><strong>週一避免追高</strong>：週一開盤下跌機率較高</li>
<li><strong>週五留意風險</strong>：週末可能有壞消息</li>
<li><strong>週二～週四</strong>：相對穩定的交易日</li>
</ol></p>
