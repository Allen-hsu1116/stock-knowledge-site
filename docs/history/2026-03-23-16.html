                <h3>DMI 參數設定</h3>

<p><strong>預設參數</strong>：
- ADX 平滑度：14
- DI 長度：14
- ADX 門檻：25-30（主觀調整）</p>

<p><strong>怎麼做</strong>：
<ol>
<li>一般使用預設值 14 日即可</li>
<li>ADX 門檻可設為 25 或 30，數值越高代表要求更明確的趨勢</li>
<li>不建議過度調整參數，熟練使用比參數優化更重要</li>
</ol>
<strong>適用週期</strong>：
- 日線、週線效果較佳
- 小時線以下容易產生假訊號</p>
