                <h2>核心知識</h2>

<h3>箱型理論是什麼？</h3>

<p><strong>核心概念</strong>：股價在「箱型區間」內整理震盪，突破箱頂代表新趨勢啟動。</p>

<p><strong>起源</strong>：Nicolas Darvas 在1950年代提出，靠此方法在18個月內把1萬美元變成200萬美元，著有《我如何在股市賺到200萬美元》。</p>

<p><strong>為什麼叫「箱子」</strong>：股價漲上去遇到賣壓（壓力線），跌下來遇到買盤（支撐線），多空在區間內拉鋸，形成像箱子的形狀。</p>
